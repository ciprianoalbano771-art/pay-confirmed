<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento Confirmado</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, #0f0f0f 0%, #1a0000 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
  }
  .card {
    background: #fff;
    color: #0f0f0f;
    border-radius: 20px;
    max-width: 440px;
    width: 100%;
    padding: 40px 32px;
    text-align: center;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    animation: pop 0.5s ease;
  }
  @keyframes pop {
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* YouTube logo */
  .yt-logo {
    width: 90px;
    height: 63px;
    background: #ff0000;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 8px 20px rgba(255,0,0,0.35);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .yt-logo .play {
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 13px 0 13px 22px;
    border-color: transparent transparent transparent #fff;
    margin-left: 4px;
  }

  /* Check badge */
  .check {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #00c851;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
    animation: pop 0.6s ease 0.2s both;
  }
  .check svg { width: 34px; height: 34px; stroke: #fff; stroke-width: 4; fill: none; }

  h1 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 15px;
    color: #555;
    margin-bottom: 28px;
    line-height: 1.5;
  }

  /* Countdown */
  .countdown-box {
    background: #f6f6f6;
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 26px;
  }
  .countdown-label {
    font-size: 13px;
    color: #777;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .timer {
    font-size: 38px;
    font-weight: 700;
    color: #ff0000;
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
  }
  .wait-text {
    font-size: 13px;
    color: #999;
    margin-top: 8px;
  }

  /* Progress bar */
  .progress {
    height: 6px;
    background: #e0e0e0;
    border-radius: 4px;
    overflow: hidden;
    margin-top: 14px;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff0000, #ff6b6b);
    border-radius: 4px;
    transition: width 1s linear;
  }

  /* WhatsApp button */
  .whatsapp-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: #25D366;
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 16px rgba(37,211,102,0.3);
  }
  .whatsapp-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(37,211,102,0.4); }
  .whatsapp-btn:active { transform: translateY(0); }
  .whatsapp-btn svg { width: 22px; height: 22px; fill: #fff; }

  .footer-note {
    margin-top: 18px;
    font-size: 12px;
    color: #aaa;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="yt-logo"><div class="play"></div></div>

    <div class="check">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>

    <h1>Pagamento Confirmado!</h1>
    <p class="subtitle">Sua transferência foi verificada com sucesso.</p>

    <div class="countdown-box">
      <div class="countdown-label">Aguarde um momento</div>
      <div class="timer" id="timer">78:00:00</div>
      <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
      <p class="wait-text" id="waitText">Estamos a processar a sua confirmação. Por favor, não feche esta página.</p>
    </div>

    <a class="whatsapp-btn" id="waBtn" href="https://wa.me/15868631749?text=Ol%C3%A1%2C%20preciso%20de%20suporte%20com%20o%20meu%20pagamento" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.71.306 1.263.489 1.694.625.712.227 1.36.195 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Suporte via WhatsApp
    </a>

    <p class="footer-note">Pagamento seguro &bull; Transação protegida</p>
  </div>

<script>
  var total = 78 * 60 * 60; // 78 horas em segundos
  var remaining = total;
  var timerEl = document.getElementById('timer');
  var fillEl = document.getElementById('progressFill');
  var waitEl = document.getElementById('waitText');

  function format(s) {
    var h = Math.floor(s / 3600);
    var m = Math.floor((s % 3600) / 60);
    var sec = s % 60;
    return (h < 10 ? '0' : '') + h + ':' +
           (m < 10 ? '0' : '') + m + ':' +
           (sec < 10 ? '0' : '') + sec;
  }

  function tick() {
    timerEl.textContent = format(remaining);
    var pct = ((total - remaining) / total) * 100;
    fillEl.style.width = pct + '%';

    if (remaining <= 0) {
      timerEl.textContent = 'Concluído!';
      timerEl.style.color = '#00c851';
      fillEl.style.width = '100%';
      waitEl.textContent = 'Confirmação concluída com sucesso! Pode prosseguir.';
      return;
    }
    remaining--;
    setTimeout(tick, 1000);
  }
  tick();
</script>
</body>
</html>
